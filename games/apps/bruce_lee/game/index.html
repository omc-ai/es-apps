// ============================================================
// MULTICOLOR CHAR RENDERER (translated from $17E2 and room drawing code)
// 2 bits per pixel: 00=bg, 01=fg(color RAM), 10=mc1, 11=mc2
// ============================================================
const charCache={};
function drawChar(ch, x, y, bg, fg, mc1, mc2){
  const key=`${ch}_${bg}_${fg}_${mc1}_${mc2}`;
  let tc=charCache[key];
  if(!tc){
    tc=document.createElement('canvas');
    tc.width=8;tc.height=8;
    const tx=tc.getContext('2d');
    const id=tx.createImageData(8,8);
    for(let row=0;row<8;row++){
      const b=CHARSET[ch*8+row];
      for(let px=0;px<4;px++){
        const bits=(b>>(6-px*2))&3;
        const ci=bits===0?bg:bits===1?fg:bits===2?mc1:mc2;
        const rgb=C[ci];
        const xx=px*2, off=(row*8+xx)*4;
        id.data[off]=CR(rgb);id.data[off+1]=CG(rgb);id.data[off+2]=CB(rgb);id.data[off+3]=255;
        id.data[off+4]=CR(rgb);id.data[off+5]=CG(rgb);id.data[off+6]=CB(rgb);id.data[off+7]=255;
      }
    }
    tx.putImageData(id,0,0);
    charCache[key]=tc;
  }
  bx.drawImage(tc, x, y);
}

// ============================================================
// HIRES SPRITE RENDERER (translated from $0C60-$0CD4)
// 1 bit per pixel, X-expanded (*2 width)
// Sprites use overlay pairs: fill sprite + outline sprite
// ============================================================
const sprCache={};
function renderSprite(block, color){
  const key=`${block}_${color}`;
  if(sprCache[key]) return sprCache[key];
  const tc=document.createElement('canvas');
  tc.width=48;tc.height=21;
  const tx=tc.getContext('2d');
  const rgb=C[color];
  const r=CR(rgb),g=CG(rgb),b=CB(rgb);
  const off=block*63;  // Each block is 63 bytes in VIC bank sprite area
  
  // Sprite data is at VIC_BANK[block*64] (64-byte aligned, 63 used)
  const sprOff=block*64;
  if(sprOff+63>VIC_BANK.length) return tc;
  
  for(let row=0;row<21;row++){
    for(let bi=0;bi<3;bi++){
      const byte=VIC_BANK[sprOff+row*3+bi];
      for(let bit=7;bit>=0;bit--){
        if(byte&(1<<bit)){
          const x=(bi*8+(7-bit))*2; // X-expanded
          tx.fillStyle=`rgb(${r},${g},${b})`;
          tx.fillRect(x,row,2,1);
        }
      }
    }
  }
  sprCache[key]=tc;
  return tc;
}

// Composite overlay sprite (fill color + black outline)
function renderOverlay(fillBlock, fillColor, outBlock){
  const key=`ov_${fillBlock}_${fillColor}_${outBlock}`;
  if(sprCache[key]) return sprCache[key];
  const tc=document.createElement('canvas');
  tc.width=48;tc.height=21;
  const tx=tc.getContext('2d');
  tx.drawImage(renderSprite(fillBlock, fillColor), 0, 0);
  tx.drawImage(renderSprite(outBlock, 0), 0, 0); // black outline on top
  sprCache[key]=tc;
  return tc;
}

function flipH(src){
  const tc=document.createElement('canvas');
  tc.width=src.width;tc.height=src.height;
  const tx=tc.getContext('2d');
  tx.translate(src.width,0);tx.scale(-1,1);
  tx.drawImage(src,0,0);
  return tc;
}

let au;
function initAu(){if(!au)au=new(window.AudioContext||window.webkitAudioContext)}
function sid(f,d,w='square',v=0.08){
  if(!au)return;
  const o=au.createOscillator(),g=au.createGain();
  o.type=w;o.frequency.value=f;
  g.gain.setValueAtTime(v,au.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,au.currentTime+d);
  o.connect(g);g.connect(au.destination);o.start();o.stop(au.currentTime+d);
}

  lanterns=[];

    for(let col=0;col<COLS;col++){
      const ch=currentScreen[row*COLS+col];
      // Lantern chars: $6B-$70, $EB-$F0 (from screen analysis)
      if((ch>=0x6B&&ch<=0x70)||(ch>=0xEB&&ch<=0xF0)){
        lanterns.push({x:col*8+4,y:row*8+4,collected:false,flash:0,row,col});

function startGame(){
  state='play';room=0;score=0;lives=5;bruce.hp=3;frame=0;
  loadRoom(0);
}

// ============================================================
// COLLISION (tile-based, from screen char analysis)
// The game reads screen RAM chars to determine solid/ladder/empty
// ============================================================
const SOLID=new Set([
  0x06,0x09,0x89,0x0A,0x8A,0x8E,0x0E,0x11,0x91,0x39,0xB9,
  0x4D,0x4E,0xCD,0xCE,0xD2,0x52,0x23,0xA3,0x35,0xB5,
  0x33,0xB3,0x34,0xB4,0x36,0xB6,0x2F,0xAF,0x30,0xB0,
  0x20, // char $20 = solid block (FF FF FF FF...)
  0x0C,0x8C,0x2D,0xAD,0x4D,
]);
const LADDER=new Set([0x1C,0x9C,0x15,0x95,0x17,0x97,0x19,0x99,0x1A,0x9A]);

function getScreenChar(px,py){
  const col=Math.floor(px/8), row=Math.floor(py/8);
  if(col<0||col>=COLS||row<0||row>=ROWS) return 0;
  return currentScreen[row*COLS+col];
}
function isSolid(px,py){ return SOLID.has(getScreenChar(px,py)); }
function isLadder(px,py){ return LADDER.has(getScreenChar(px,py)); }

// ============================================================
// PHYSICS (translated from movement code)
// Gravity, jump, platform collision
// Constants derived from 6502 code timing at 50Hz
// ============================================================
const GRAV=0.6;     // Gravity per frame
const JUMP_VEL=-4.5; // Jump velocity
const WALK_SPD=1.4;  // Walk speed
const CLIMB_SPD=1.0; // Climb speed

function checkGround(ch){
  const footY=ch.y+19;
  // Check tile below feet (translated from screen RAM collision checks)
  if(isSolid(ch.x+6, footY+1) || isSolid(ch.x+18, footY+1)){
    const snapY=Math.floor((footY+1)/8)*8-19;
    if(Math.abs(ch.y-snapY)<6){
      ch.y=snapY;ch.vy=0;ch.onGround=true;ch.climbing=false;
      return true;
    }
  }
  if(footY>=192){ch.y=173;ch.vy=0;ch.onGround=true;return true}
  ch.onGround=false;
  return false;
}

function updateChar(ch, isPlayer){
  if(!ch.alive){
    if(ch.respawn>0){ch.respawn--;if(ch.respawn===0){ch.alive=true;ch.hp=3;ch.x=160;ch.y=40;ch.vy=0}}
    return;
  }
  if(ch.stun>0){
    ch.stun--;
    ch.x+=ch.vx*0.3;ch.vx*=0.92;
    if(!ch.climbing){ch.vy+=GRAV;ch.y+=ch.vy}
    checkGround(ch);
    return;
  }
  if(ch.invuln>0) ch.invuln--;
  
  if(!ch.climbing){
    ch.vy+=GRAV;
    ch.y+=ch.vy;
    // Ceiling check
    if(ch.vy<0 && isSolid(ch.x+12, ch.y)) ch.vy=0;
    if(ch.y>210){
      if(isPlayer) loseLife();
      else{ch.alive=false;ch.respawn=75}
      return;
    }
    checkGround(ch);
  }
  
  // Horizontal movement with wall check
  const nx=ch.x+ch.vx;
  if(!isSolid(nx+4,ch.y+10) && !isSolid(nx+20,ch.y+10)){
    ch.x=nx;
  }
  if(ch.x<0)ch.x=0;
  if(ch.x>296)ch.x=296;
  if(ch.atk>0) ch.atk--;
}

function loseLife(){
  lives--;
  if(lives<=0){state='gameover';SND.die()}
  else{bruce.hp=3;SND.die();loadRoom(room)}
}

// ============================================================
// PLAYER UPDATE (translated from input + movement code)
// ============================================================
function updateBruce(){
  bruce.vx=0;
  if(bruce.atk>0){updateChar(bruce,true);return}
  
  if(keys.ArrowLeft){bruce.vx=-WALK_SPD;bruce.dir=-1}
  if(keys.ArrowRight){bruce.vx=WALK_SPD;bruce.dir=1}
  
  // Climbing (from ladder detection code)
  if(keys.ArrowUp && isLadder(bruce.x+12,bruce.y+10)){
    bruce.climbing=true;bruce.vy=-CLIMB_SPD;bruce.y+=bruce.vy;
  } else if(keys.ArrowDown && isLadder(bruce.x+12,bruce.y+20)){
    bruce.climbing=true;bruce.vy=CLIMB_SPD;bruce.y+=bruce.vy;
  } else if(bruce.climbing && !keys.ArrowUp && !keys.ArrowDown){
    bruce.vy=0;
  }
  if(bruce.climbing && !isLadder(bruce.x+12,bruce.y+10) && !isLadder(bruce.x+12,bruce.y+20))
    bruce.climbing=false;
  
  // Jump
  if(keys.Space && bruce.onGround && !bruce.climbing){
    bruce.vy=JUMP_VEL;bruce.onGround=false;SND.jump();
  }
  // Kick (from combat system analysis)
  if(keys.KeyZ && bruce.atk===0){
    bruce.atk=10;bruce.atkType=1;SND.kick();
    if(!bruce.onGround) bruce.vx=bruce.dir*2.5;
  }
  // Punch
  if(keys.KeyX && bruce.atk===0){
    bruce.atk=7;bruce.atkType=2;SND.punch();
  }
  
  // Walk animation (4 frames from animation table)
  if(Math.abs(bruce.vx)>0.3){
    bruce.walkTimer++;
    if(bruce.walkTimer>4){bruce.walkTimer=0;bruce.walkFrame=(bruce.walkFrame+1)%4}
  }
  
  updateChar(bruce,true);
  
  // Lantern collection
  for(const la of lanterns){
    if(la.collected) continue;
    if(Math.abs(bruce.x+12-la.x)<12 && Math.abs(bruce.y+10-la.y)<12){
      la.collected=true;la.flash=15;score+=100;SND.collect();
    }
  }
  
  // Room exit (from room flag analysis)
  if(lanterns.length>0 && lanterns.every(l=>l.collected)){
    if(bruce.x>290 || bruce.y<10){
      if(room>=19){state='victory';SND.win();return}
      loadRoom((room+1)%20);
    }
  }
}

// ============================================================
// ENEMY AI (translated from $0C02-$0C38 enemy behavior)
// Uses enemy_flags tables for per-room behavior
// ============================================================
function updateAI(ch, speedMul){
  if(!ch.alive){
    if(ch.respawn>0){ch.respawn--;if(ch.respawn===0){ch.alive=true;ch.hp=3;ch.x=160;ch.y=40;ch.vy=0}}
    return;
  }
  if(ch.stun>0){updateChar(ch,false);return}
  
  // Combat distance check (from $2DF6: LDA $9E,X; SEC; SBC $9E)
  const dx=bruce.x-ch.x, dy=bruce.y-ch.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<22 && ch.atk===0 && bruce.alive){
    ch.atk=25;
    if(bruce.invuln===0){
      bruce.hp--;bruce.invuln=25;SND.hit();bruce.stun=6;
      bruce.vx=Math.sign(dx)*-2;
      if(bruce.hp<=0){bruce.hp=3;loseLife()}
    }
  }
  if(ch.atk>0) ch.atk--;
  
  // Pathfinding: move toward Bruce
  if(Math.abs(dy)>14 && isLadder(ch.x+12,ch.y+10)){
    ch.climbing=true;
    ch.vy=(dy>0?CLIMB_SPD:-CLIMB_SPD)*speedMul;
    ch.y+=ch.vy;ch.vx=0;
  } else {
    ch.climbing=false;
    ch.vx=(dx>0?WALK_SPD:-WALK_SPD)*speedMul;
    ch.dir=dx>0?1:-1;
  }
  
  updateChar(ch,false);
}

// ============================================================
// COMBAT (translated from distance check at $2DF6)
// ============================================================
function checkCombat(){
  if(bruce.atk<=0) return;
  const range=bruce.atkType===1?26:14;
  const ax=bruce.x+(bruce.dir>0?24:-range+8);
  
  [yamo,ninja].forEach(e=>{
    if(!e.alive||e.stun>0) return;
    if(Math.abs(ax-e.x-12)<range && Math.abs(bruce.y-e.y)<18){
      e.stun=15;e.vx=bruce.dir*3;e.vy=-2;SND.hit();score+=50;
      e.hp--;
      if(e.hp<=0){e.alive=false;e.respawn=75}
    }
  });
}

// ============================================================
// RENDERING (translated from screen drawing and sprite update code)
// ============================================================
function drawRoom(){
  // Border (from VIC $D020)
  bx.fillStyle=`#${C[0].toString(16).padStart(6,'0')}`;
  bx.fillRect(0,0,W,H);
  
  // Game area background (VIC $D021 = color 12 grey)
  bx.fillStyle=`#${C[12].toString(16).padStart(6,'0')}`;
  bx.fillRect(OX,OY,GW,GH);
  
  // Draw ALL screen characters with per-cell colors
  // (translated from $17E2 screen drawing routine)
  const bg=12, mc1=2, mc2=1;
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const ch=currentScreen[row*COLS+col];
      if(ch===0) continue; // Only skip truly empty (char 0)
      const fg=currentColors[row*COLS+col]&0x0F;
      drawChar(ch, OX+col*8, OY+row*8, bg, fg, mc1, mc2);
    }
  }
  
  // Lanterns
  for(const la of lanterns){
    if(la.collected){
      if(la.flash>0){la.flash--;bx.fillStyle='#B8C76F';bx.fillRect(OX+la.x-4,OY+la.y-4,8,8)}
      continue;
    }
    bx.drawImage(spriteImgs.lantern, OX+la.x-24, OY+la.y-10);
  }
  
  // Exit indicator
  if(lanterns.length>0 && lanterns.every(l=>l.collected)){
    bx.fillStyle=frame%8<4?'#FFFFFF':'#B8C76F';
    bx.fillRect(OX+296,OY+155,8,12);
  }
}

function getSpriteFrame(ch){
  if(ch===bruce){
    if(ch.stun>0) return ch.dir>0?spriteImgs.bruceStandR:spriteImgs.bruceStandL;
    if(ch.climbing) return ch.dir>0?spriteImgs.bruceClimbR:spriteImgs.bruceClimbL;
    if(ch.atk>0 && ch.atkType===1) return ch.dir>0?spriteImgs.bruceKickR:spriteImgs.bruceKickL;
    if(ch.atk>0) return ch.dir>0?spriteImgs.bruceStandR:spriteImgs.bruceStandL;
    if(!ch.onGround) return ch.dir>0?spriteImgs.bruceKickR:spriteImgs.bruceKickL;
    if(Math.abs(ch.vx)>0.3){
      const frames=[
        [spriteImgs.bruceWalk1R,spriteImgs.bruceWalk1L],
        [spriteImgs.bruceWalk2R,spriteImgs.bruceWalk2L],
        [spriteImgs.bruceWalk3R,spriteImgs.bruceWalk3L],
        [spriteImgs.bruceWalk4R,spriteImgs.bruceWalk4L],
      ];
      const f=frames[ch.walkFrame%4];
      return ch.dir>0?f[0]:f[1];
    }
    return ch.dir>0?spriteImgs.bruceStandR:spriteImgs.bruceStandL;
  }
  if(ch===yamo) return ch.dir>0?spriteImgs.yamoR:spriteImgs.yamoL;
  return ch.dir>0?spriteImgs.ninjaR:spriteImgs.ninjaL;
}

function drawSprite(ch){
  if(!ch.alive) return;
  if(ch.invuln>0 && frame%3===0) return;
  const spr=getSpriteFrame(ch);
  // Sprite position: translated from $0C84 (x*2, y+$1D offset)
  bx.drawImage(spr, OX+Math.round(ch.x), OY+Math.round(ch.y));
}

function drawHUD(){
  // Status bar (from screen analysis: row 0-1 black area)
  bx.fillStyle='#000000';
  bx.fillRect(OX,OY,GW,16);
  bx.fillStyle='#FFFFFF';
  bx.font='8px monospace';
  bx.fillText(String(score).padStart(6,'0'),OX+16,OY+10);
  bx.fillText('TOP '+String(score).padStart(6,'0'),OX+104,OY+10);
  bx.fillText('FALLS '+String(lives).padStart(2,'0'),OX+232,OY+10);
  // HP
  for(let i=0;i<bruce.hp;i++){
    bx.fillStyle='#588D43';bx.fillRect(OX+72+i*8,OY+3,6,5);
  }
  bx.fillStyle='#959595';bx.font='7px monospace';
  bx.fillText('R'+(room+1),OX+300,OY+10);
}

function drawTitle(){
  // Title screen - blue bg with light blue border matching original C64
  bx.fillStyle='#6C5EB5';bx.fillRect(0,0,W,H);
  bx.fillStyle='#352879';bx.fillRect(OX,OY,GW,GH);
  bx.fillStyle='#B8C76F';bx.font='bold 32px monospace';
  bx.fillText('BRUCE',OX+24,OY+50);bx.fillText('  LEE',OX+24,OY+82);
  bx.fillStyle='#70A4B2';bx.font='8px monospace';
  bx.fillText('PROGRAMMED BY',OX+16,OY+108);
  bx.fillStyle='#FFFFFF';bx.fillText('RON J FORTIER',OX+16,OY+120);
  bx.fillStyle='#70A4B2';bx.fillText('GRAPHIC ART BY',OX+16,OY+136);
  bx.fillStyle='#FFFFFF';bx.fillText('KELLY DAY',OX+16,OY+148);
  bx.drawImage(spriteImgs.bruceStandR,OX+200,OY+100);
  bx.drawImage(spriteImgs.yamoR,OX+250,OY+98);
  bx.drawImage(spriteImgs.ninjaR,OX+210,OY+140);
  bx.fillStyle='#959595';bx.font='8px monospace';
  bx.fillText('Datasoft Inc.',OX+230,OY+185);
  if(frame%50<30){bx.fillStyle='#B8C76F';bx.font='10px monospace';bx.fillText('PRESS SPACE TO PLAY',OX+80,OY+178)}
}

// ============================================================
// MAIN LOOP (50Hz PAL - translated from raster interrupt timing)
// ============================================================
function gameLoop(){
  frame++;
  if(state==='title'){
    drawTitle();
  } else if(state==='play'&&!paused){
    updateBruce();
    updateAI(yamo,0.55);
    updateAI(ninja,0.75);
    checkCombat();
    drawRoom();
    drawSprite(yamo);drawSprite(ninja);drawSprite(bruce);
    drawHUD();
  } else if(state==='play'&&paused){
    drawRoom();drawSprite(yamo);drawSprite(ninja);drawSprite(bruce);drawHUD();
    bx.fillStyle='rgba(0,0,0,0.5)';bx.fillRect(0,0,W,H);
    bx.fillStyle='#FFFFFF';bx.font='16px monospace';bx.fillText('PAUSED',OX+120,OY+100);
  } else if(state==='gameover'){
    bx.fillStyle='#000000';bx.fillRect(0,0,W,H);
    bx.fillStyle='#68372B';bx.font='20px monospace';bx.fillText('GAME OVER',OX+88,OY+80);
    bx.fillStyle='#FFFFFF';bx.font='10px monospace';bx.fillText('Score: '+score,OX+118,OY+110);
    bx.fillStyle=frame%40<20?'#B8C76F':'#000000';bx.fillText('SPACE to restart',OX+88,OY+145);
    if(keys.Space){keys.Space=false;startGame()}
  } else if(state==='victory'){
    bx.fillStyle='#352879';bx.fillRect(0,0,W,H);
    bx.fillStyle='#B8C76F';bx.font='20px monospace';bx.fillText('VICTORY!',OX+100,OY+70);
    bx.fillStyle='#FFFFFF';bx.font='10px monospace';
    bx.fillText('The fortress is conquered!',OX+56,OY+100);
    bx.fillText('Score: '+score,OX+118,OY+125);
    bx.fillStyle=frame%40<20?'#B8C76F':'#352879';bx.fillText('SPACE to play again',OX+72,OY+160);
    if(keys.Space){keys.Space=false;startGame()}
  }
  ctx.drawImage(buf,0,0,W,H,0,0,CW,CH);
}

// ============================================================
// INITIALIZATION
// ============================================================
initSprites();
setInterval(gameLoop, 20); // 50Hz PAL timing!
</script></body></html>
