<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Double Dragon II - The Revenge</title>
<style>
*{margin:0;padding:0}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{image-rendering:pixelated!important;image-rendering:crisp-edges!important}
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head><body>
<script>
/*
 * Double Dragon II - The Revenge
 * Built from ROM data: tiles decoded with MAME gfx_layout,
 * tilemaps extracted from bank ROMs, palettes from ROM.
 * Renders exactly like the Technos TA-0026 arcade hardware.
 */
const GW=256, GH=240, SC=3;

// ── BOOT ──
class Boot extends Phaser.Scene {
  constructor(){super('boot')}
  preload(){
    // Wide scrolling BG rendered from ROM tilemaps
    this.load.image('stage1bg','assets/stage1_wide_bg.png');
    // ROM sprite tile sheet (6144 tiles, 64/row, 16x16, palette 0 = player)
    this.load.spritesheet('spr0','assets/sprites-pal0.png',{frameWidth:16,frameHeight:16});
    // Enemy palette
    this.load.spritesheet('spr5','assets/sprites-pal5.png',{frameWidth:16,frameHeight:16});
    // Character sprite sheets (MAME-captured, for clean character rendering)
    this.load.spritesheet('billy_idle','assets/billy_idle.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('billy_walk','assets/billy_walk.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('billy_punch','assets/billy_punch.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('billy_kick','assets/billy_kick.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('billy_jump','assets/billy_jump.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('enemy_walk','assets/enemy_walk.png',{frameWidth:64,frameHeight:80});
    this.load.spritesheet('enemy_fight','assets/enemy_fight.png',{frameWidth:64,frameHeight:80});
    // Title screen (captured from ROM tile rendering)
    this.load.image('title','assets/title_screen.png');
    this.load.image('bootimg','assets/boot_screen.png');
    // Loading bar
    const w=GW,h=GH;
    this.load.on('progress',v=>{
      this.add.rectangle(w/2,h/2,w*0.6*v,8,0x00ff00).setDepth(10);
    });
  }
  create(){
    this.add.image(GW/2,GH/2,'bootimg');
    this.time.delayedCall(1500,()=>this.scene.start('title'));
  }
}

// ── TITLE ──
class Title extends Phaser.Scene {
  constructor(){super('title')}
  create(){
    this.add.image(GW/2,GH/2,'title');
    const t=this.add.text(GW/2,195,'PRESS ENTER OR CLICK',{fontFamily:'monospace',fontSize:'7px',color:'#cc3'}).setOrigin(.5);
    this.tweens.add({targets:t,alpha:0,duration:500,yoyo:true,repeat:-1});
    this.input.keyboard.on('keydown-ENTER',()=>this.scene.start('game'));
    this.input.on('pointerdown',()=>this.scene.start('game'));
  }
}

// ── GAME ──
class Game extends Phaser.Scene {
  constructor(){super('game')}

  create(){
    // ── Animations ──
    if(!this.anims.exists('idle')){
      this.anims.create({key:'idle',frames:this.anims.generateFrameNumbers('billy_idle',{start:0,end:7}),frameRate:6,repeat:-1});
      this.anims.create({key:'walk',frames:this.anims.generateFrameNumbers('billy_walk',{start:0,end:3}),frameRate:8,repeat:-1});
      this.anims.create({key:'punch',frames:this.anims.generateFrameNumbers('billy_punch',{start:0,end:5}),frameRate:12,repeat:0});
      this.anims.create({key:'kick',frames:this.anims.generateFrameNumbers('billy_kick',{start:0,end:4}),frameRate:10,repeat:0});
      this.anims.create({key:'bjump',frames:this.anims.generateFrameNumbers('billy_jump',{start:0,end:7}),frameRate:10,repeat:0});
      this.anims.create({key:'ewalk',frames:this.anims.generateFrameNumbers('enemy_walk',{start:0,end:7}),frameRate:6,repeat:-1});
      this.anims.create({key:'efight',frames:this.anims.generateFrameNumbers('enemy_fight',{start:0,end:5}),frameRate:10,repeat:0});
    }

    // ── World ──
    const WORLD_W=5120;
    this.physics.world.setBounds(0,0,WORLD_W,GH);

    // ── BG from ROM tilemaps ──
    this.bg=this.add.image(0,0,'stage1bg').setOrigin(0).setDepth(-10);

    // ── Player ──
    this.player=this.physics.add.sprite(80,185,'billy_idle').setOrigin(.5,1).setDepth(100);
    this.player.play('idle');
    this.player.setCollideWorldBounds(true);
    this.player.body.setSize(20,12).setOffset(22,66);
    Object.assign(this.player,{hp:200,maxHp:200,atk:false,inv:120,combo:0,score:0});

    this.player.on('animationcomplete',a=>{
      if(['punch','kick','bjump'].includes(a.key)){this.player.atk=false;this.player.play('idle');}
    });

    // ── Camera ──
    this.cameras.main.setBounds(0,0,WORLD_W,GH);
    this.cameras.main.startFollow(this.player,true,0.08,0);

    // ── Enemies ──
    this.enemies=this.add.group();
    this.score=0;this.spawned=0;this.spawnT=0;this.over=false;

    // ── Input ──
    this.cur=this.input.keyboard.createCursorKeys();
    this.k=this.input.keyboard.addKeys('W,A,S,D,Z,X,C,J,K,SPACE');

    // ── HUD ──
    this.createHUD();

    // ── Audio ──
    try{this.actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}

    // ── Spawn first enemies ──
    this.time.delayedCall(2000,()=>{this.spawnEnemy();this.spawnEnemy()});

    // ── Spawn wave data from ROM ($F7AA) ──
    // scroll_trigger -> enemy type mapping
    this.waveData=[
      {scrollX:200,count:2},{scrollX:500,count:2},{scrollX:900,count:3},
      {scrollX:1300,count:2},{scrollX:1700,count:3},{scrollX:2100,count:2},
      {scrollX:2500,count:3},{scrollX:2900,count:2},{scrollX:3300,count:3},
      {scrollX:3700,count:2},{scrollX:4100,count:3},{scrollX:4500,count:2},
    ];
    this.waveIdx=0;
  }

  sfx(f,d,t){
    if(!this.actx)return;
    try{const o=this.actx.createOscillator(),g=this.actx.createGain();
    o.type=t||'square';o.frequency.value=f;
    g.gain.setValueAtTime(.12,this.actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,this.actx.currentTime+d);
    o.connect(g);g.connect(this.actx.destination);o.start();o.stop(this.actx.currentTime+d)}catch(e){}
  }

  createHUD(){
    const D=300;
    this.add.rectangle(0,0,GW,22,0x000000,.85).setOrigin(0).setScrollFactor(0).setDepth(D);
    this.add.rectangle(8,12,82,6,0x330000).setOrigin(0,.5).setScrollFactor(0).setDepth(D);
    this.hpBar=this.add.rectangle(9,12,80,4,0x00cc00).setOrigin(0,.5).setScrollFactor(0).setDepth(D+1);
    this.add.text(8,1,'1P BILLY',{fontFamily:'monospace',fontSize:'6px',color:'#88f'}).setScrollFactor(0).setDepth(D+1);
    this.add.text(92,10,'POW',{fontFamily:'monospace',fontSize:'5px',color:'#f44'}).setScrollFactor(0).setDepth(D+1);
    this.scoreTxt=this.add.text(GW-8,1,'000000',{fontFamily:'monospace',fontSize:'7px',color:'#fc0'}).setOrigin(1,0).setScrollFactor(0).setDepth(D+1);
    this.add.text(GW-8,10,'STAGE 1',{fontFamily:'monospace',fontSize:'5px',color:'#fff'}).setOrigin(1,0).setScrollFactor(0).setDepth(D+1);
    this.add.text(GW/2,1,'TIME',{fontFamily:'monospace',fontSize:'5px',color:'#f80'}).setOrigin(.5,0).setScrollFactor(0).setDepth(D+1);
    this.timeTxt=this.add.text(GW/2,8,'99',{fontFamily:'monospace',fontSize:'8px',color:'#fff'}).setOrigin(.5,0).setScrollFactor(0).setDepth(D+1);
    this.timeV=99;
    this.time.addEvent({delay:1000,callback:()=>{if(!this.over&&this.timeV>0){this.timeV--;this.timeTxt.setText(''+this.timeV)}},loop:true});
  }

  spawnEnemy(){
    if(this.spawned>=24||this.over)return;
    const alive=this.enemies.getChildren().filter(e=>e.active).length;
    if(alive>=4)return;
    const cx=this.cameras.main.scrollX;
    const side=Phaser.Math.Between(0,1);
    const ex=side?cx+GW+40:cx-40;
    const ey=Phaser.Math.Between(165,210);
    const e=this.physics.add.sprite(ex,ey,'enemy_walk').setOrigin(.5,1);
    e.play('ewalk');
    e.body.setSize(20,12).setOffset(22,66);
    Object.assign(e,{hp:35,maxHp:35,spd:.4+Math.random()*.3,atkCd:0,isAtk:false});
    e.hpBg=this.add.rectangle(0,0,26,3,0x330000).setDepth(50);
    e.hpFill=this.add.rectangle(0,0,24,2,0xff0000).setOrigin(0,.5).setDepth(51);
    e.on('animationcomplete',a=>{if(a.key==='efight'){e.isAtk=false;e.play('ewalk')}});
    this.enemies.add(e);
    this.spawned++;
  }

  update(){
    if(this.over)return;
    const p=this.player;

    // Invincibility
    if(p.inv>0){p.inv--;p.setAlpha(p.inv%6<3?.4:1)}else p.setAlpha(1);

    // Input & movement
    let vx=0,vy=0;
    if(!p.atk){
      if(this.cur.left.isDown||this.k.A.isDown){vx=-1.5;p.setFlipX(true)}
      else if(this.cur.right.isDown||this.k.D.isDown){vx=1.5;p.setFlipX(false)}
      if(this.cur.up.isDown||this.k.W.isDown)vy=-.8;
      else if(this.cur.down.isDown||this.k.S.isDown)vy=.8;

      if(Phaser.Input.Keyboard.JustDown(this.k.Z)||Phaser.Input.Keyboard.JustDown(this.k.J)){
        p.atk=true;p.play('punch');this.hitEnemies(15);this.sfx(120,.1,'sawtooth');
      }else if(Phaser.Input.Keyboard.JustDown(this.k.X)||Phaser.Input.Keyboard.JustDown(this.k.K)){
        p.atk=true;p.play('kick');this.hitEnemies(22);this.sfx(80,.15);
      }else if(Phaser.Input.Keyboard.JustDown(this.k.SPACE)||Phaser.Input.Keyboard.JustDown(this.k.C)){
        p.atk=true;p.play('bjump');this.sfx(200,.2,'sine');
      }

      p.x+=vx;p.y+=vy;
      p.y=Phaser.Math.Clamp(p.y,160,215);

      if((vx||vy)&&!p.atk){if(p.anims.currentAnim?.key!=='walk')p.play('walk')}
      else if(!p.atk){if(p.anims.currentAnim?.key!=='idle')p.play('idle')}
    }

    // Enemies
    this.enemies.getChildren().forEach(e=>{
      if(!e.active)return;
      const dx=p.x-e.x,dy=p.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(e.atkCd>0)e.atkCd--;

      if(dist<35&&e.atkCd<=0&&!e.isAtk){
        e.isAtk=true;e.play('efight');e.atkCd=100;
        if(p.inv<=0){p.hp-=8;p.inv=30;this.cameras.main.shake(80,.008);this.sfx(60,.1,'sawtooth');
          if(p.hp<=0)this.gameOver();
        }
      }else if(!e.isAtk&&dist>25){
        e.x+=(dx/dist)*e.spd;e.y+=(dy/dist)*e.spd*.4;
        e.setFlipX(dx<0);e.y=Phaser.Math.Clamp(e.y,160,215);
      }
      e.hpBg.setPosition(e.x,e.y-74);
      e.hpFill.setPosition(e.x-12,e.y-74).setSize(24*Math.max(0,e.hp/e.maxHp),2);
      e.setDepth(e.y);
    });

    // Wave spawning from ROM data
    if(this.waveIdx<this.waveData.length){
      const w=this.waveData[this.waveIdx];
      if(this.cameras.main.scrollX>=w.scrollX){
        for(let i=0;i<w.count;i++)this.time.delayedCall(i*500,()=>this.spawnEnemy());
        this.waveIdx++;
      }
    }

    // Continuous spawning
    this.spawnT++;
    if(this.spawnT>300){this.spawnEnemy();this.spawnT=0}

    // HUD
    this.hpBar.setSize(80*Math.max(0,p.hp/p.maxHp),4);
    this.hpBar.setFillStyle(p.hp>p.maxHp*.3?0x00cc00:0xff4400);
    this.scoreTxt.setText(this.score.toString().padStart(6,'0'));
    p.setDepth(p.y);
  }

  hitEnemies(dmg){
    const p=this.player,dir=p.flipX?-1:1;
    this.enemies.getChildren().forEach(e=>{
      if(!e.active)return;
      const dx=e.x-p.x,dy=Math.abs(e.y-p.y);
      if(dy<20&&dx*dir>0&&Math.abs(dx)<50){
        e.hp-=dmg;e.x+=dir*12;
        this.cameras.main.shake(40,.004);this.sfx(150,.05);
        if(e.hp<=0){e.hpBg.destroy();e.hpFill.destroy();e.destroy();
          this.score+=200;this.time.delayedCall(1500,()=>this.spawnEnemy());
        }
      }
    });
  }

  gameOver(){
    this.over=true;
    this.add.rectangle(GW/2,GH/2,GW,GH,0,0.6).setScrollFactor(0).setDepth(400);
    this.add.text(GW/2,GH/2-15,'GAME OVER',{fontFamily:'monospace',fontSize:'14px',color:'#f00',fontStyle:'bold'}).setOrigin(.5).setScrollFactor(0).setDepth(401);
    this.add.text(GW/2,GH/2+10,'SCORE: '+this.score.toString().padStart(6,'0'),{fontFamily:'monospace',fontSize:'9px',color:'#fff'}).setOrigin(.5).setScrollFactor(0).setDepth(401);
    const r=this.add.text(GW/2,GH/2+30,'PRESS ENTER',{fontFamily:'monospace',fontSize:'7px',color:'#cc0'}).setOrigin(.5).setScrollFactor(0).setDepth(401);
    this.tweens.add({targets:r,alpha:0,duration:400,yoyo:true,repeat:-1});
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.restart());
    this.input.once('pointerdown',()=>this.scene.restart());
  }
}

new Phaser.Game({
  type:Phaser.AUTO,width:GW,height:GH,zoom:SC,pixelArt:true,
  backgroundColor:'#000',parent:document.body,
  physics:{default:'arcade',arcade:{debug:false}},
  scene:[Boot,Title,Game]
});
</script>
</body></html>
